name: "Draw Keymap"

on:
  workflow_dispatch:
  # push時に自動で実行する場合は、以下のコメントアウトを外す
  push:
    paths:
       - "config/roBa.keymap"
       - "keymap-drawer/config.yml"
       - "config/roBa.dtsi"
       - ".github/workflows/draw.yml"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: write
    with:
      commit_message: "[Draw] ${{ github.event.head_commit.message || 'Update keymap drawing' }}"
      amend_commit: false
      keymap_patterns: "config/*.keymap"
      json_path: "config"
      config_path: "keymap-drawer/config.yml" # config file, ignored if not exists
      output_folder: "keymap-drawer"
      destination: "both"
